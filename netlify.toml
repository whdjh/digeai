[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# /api/* 요청을 Netlify Functions로 리다이렉트 (200 = rewrite)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — 404를 index.html로 (라우팅이 React에서 처리되도록)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  framework = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false
